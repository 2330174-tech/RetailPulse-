apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailpulse
  labels:
    app: retailpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retailpulse
  template:
    metadata:
      labels:
        app: retailpulse
    spec:
      containers:
        - name: retailpulse
          image: retailpulse:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: PORT
              value: "8501"
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: retailpulse
spec:
  selector:
    app: retailpulse
  ports:
    - name: http
      port: 80
      targetPort: 8501
  type: ClusterIP
